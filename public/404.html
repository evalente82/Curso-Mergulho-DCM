<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Curso Mergulho DCM</title>
  <script>
    // GitHub Pages SPA redirect trick
    // Preserva a rota e redireciona para o index.html
    // EXCETO /admin/ — que deve carregar o Decap CMS diretamente
    var l = window.location;
    var path = l.pathname;
    var basePath = '/Curso-Mergulho-DCM';

    // Se a URL começa com /admin/, não redireciona — deixa o servidor
    // servir dist/admin/index.html diretamente
    if (path.indexOf(basePath + '/admin') === 0) {
      // Redireciona para o arquivo correto do CMS sem o redirect trick
      l.replace(basePath + '/admin/index.html');
    } else {
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 2).join('/') +
        '/?p=/' + l.pathname.slice(1).split('/').slice(1).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    }
  </script>
</head>
<body></body>
</html>
