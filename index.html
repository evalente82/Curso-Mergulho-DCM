<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Curso Mergulho DCM</title>
    <link rel="icon" type="image/png" sizes="192x192" href="/Curso-Mergulho-DCM/icons/192.png" />
    <link rel="apple-touch-icon" href="/Curso-Mergulho-DCM/icons/192.png" />
    <!-- manifest.webmanifest é injetado automaticamente pelo VitePWA no build -->
    <!-- GitHub Pages SPA: recebe o redirect do 404.html e restaura a rota -->
    <script>
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
