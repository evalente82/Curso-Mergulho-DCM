name: CI / Build and Deploy

on:
  push:
    branches: [ main ]

# Permissões obrigatórias para o método oficial de deploy do GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Garante que só um deploy rode por vez
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fix chapter encoding (garante UTF-8 correto mesmo após edição pelo CMS)
        run: |
          pip install ftfy -q
          python scripts/fix-encoding-body.py

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

      - name: Upload artifact para GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          timeout: 600000
          error_count: 10
          reporting_interval: 5000
