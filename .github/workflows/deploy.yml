name: CI / Build and Deploy

on:
  push:
    branches: [ main ]

# Permissões obrigatórias para o método oficial de deploy do GitHub Pages
permissions:
  contents: write      # necessário para commitar encoding fix de volta ao repo
  pages: write
  id-token: write

# Deploys aguardam em fila — NÃO cancela o anterior
# Isso garante que cada Save do CMS gere um deploy completo
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fix chapter encoding (corrige mojibake do CMS e commita de volta)
        run: |
          pip install ftfy -q
          python scripts/fix-encoding-body.py
          # Se houve correções, commita de volta para o repo
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet || git commit -am "fix(encoding): correcao automatica de mojibake pos-CMS [skip ci]"
          git push || true

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

      - name: Upload artifact para GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          timeout: 600000
          error_count: 10
          reporting_interval: 5000
